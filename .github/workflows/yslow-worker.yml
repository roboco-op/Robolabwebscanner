name: YSlow Worker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: yslow-worker
  cancel-in-progress: false

jobs:
  yslow-once:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing required secrets: SUPABASE_URL and/or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

      - name: Run YSlow batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YSLOW_WORKER_BATCH_SIZE: ${{ vars.YSLOW_WORKER_BATCH_SIZE }}
          YSLOW_ASSET_SAMPLE_SIZE: ${{ vars.YSLOW_ASSET_SAMPLE_SIZE }}
        run: npm run yslow:once
